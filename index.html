<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snail Chomps the House!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas {
    border-radius: 16px;
    display: block;
    image-rendering: auto;
  }

  #controls {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }

  .btn {
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    font-size: 28px;
    font-weight: bold;
    border: none;
    border-radius: 20px;
    padding: 18px 36px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.2);
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.2);
  }

  #btnUp { background: linear-gradient(180deg, #4ecdc4, #2bab9e); }
  #btnDown { background: linear-gradient(180deg, #ff6b6b, #d63031); }
  #btnChomp { background: linear-gradient(180deg, #fdcb6e, #e17055); }

  #playAgain {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(180deg, #a29bfe, #6c5ce7);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 24px 48px;
    cursor: pointer;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    box-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 12px 30px rgba(0,0,0,0.3);
    z-index: 10;
    animation: bounce 0.6s ease infinite alternate;
  }

  #playAgain:active, #nextLevel:active {
    transform: translate(-50%, -50%) translateY(4px);
  }

  #nextLevel {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(180deg, #55efc4, #00b894);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 24px 48px;
    cursor: pointer;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    box-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 12px 30px rgba(0,0,0,0.3);
    z-index: 10;
    animation: bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
  <button class="btn" id="btnUp">&#11014; UP</button>
  <button class="btn" id="btnDown">&#11015; DOWN</button>
  <button class="btn" id="btnChomp">&#128064; CHOMP!</button>
</div>
<button id="playAgain">YAY! Play Again!</button>
<button id="nextLevel">NEXT LEVEL!</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function unlockAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

function playNoise(duration, volume, filterFreq) {
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(filterFreq, audioCtx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start();
}

function playTone(freq, duration, type, volume) {
  const osc = audioCtx.createOscillator();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxChomp() {
  playNoise(0.12, 0.4, 1200);
  playTone(300, 0.06, 'square', 0.12);
  setTimeout(() => playTone(200, 0.06, 'square', 0.1), 50);
}

function sfxBigChomp() {
  playNoise(0.25, 0.5, 800);
  playTone(200, 0.1, 'sawtooth', 0.15);
  setTimeout(() => playNoise(0.15, 0.3, 600), 80);
}

function sfxMove() {
  playTone(500, 0.06, 'sine', 0.08);
}

function sfxStrain() {
  playTone(120, 0.8, 'sawtooth', 0.08);
  playTone(130, 0.8, 'sawtooth', 0.06);
}

function sfxPoop() {
  playTone(400, 0.08, 'sine', 0.15);
  setTimeout(() => playTone(250, 0.12, 'sine', 0.2), 60);
  setTimeout(() => playNoise(0.1, 0.25, 800), 100);
  setTimeout(() => playTone(600, 0.15, 'square', 0.1), 150);
}

function sfxWin() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => {
    setTimeout(() => playTone(n, 0.2, 'square', 0.1), i * 120);
  });
}

const COLS = 5;
const ROWS = 7;

let W, H, BLOCK_W, BLOCK_H, HOUSE_X, HOUSE_Y, HOUSE_W, HOUSE_H;

function sizing() {
  const maxW = Math.min(window.innerWidth - 20, 700);
  const maxH = Math.min(window.innerHeight - 140, 560);
  W = maxW;
  H = maxH;
  canvas.width = W;
  canvas.height = H;

  BLOCK_W = Math.floor(W * 0.1);
  BLOCK_H = Math.floor(H * 0.075);
  HOUSE_W = COLS * BLOCK_W;
  HOUSE_H = ROWS * BLOCK_H;
  HOUSE_X = Math.floor((W - HOUSE_W) / 2);
  HOUSE_Y = H - HOUSE_H - Math.floor(H * 0.13);
}

const BRICK_COLORS = [
  '#e17055', '#d63031', '#e74c3c', '#c0392b',
  '#b33939', '#cd6133', '#cc8e35', '#d35400'
];

let level = 1;

let house = [];
let snailRow = ROWS - 1;
let snailScale = 1.0;
let chomping = false;
let chompTimer = 0;
let busting = false;
let bustTimer = 0;
let bustParticles = [];
let gameOver = false;
let crunchParticles = [];

let snail2Row = ROWS - 1;
let snail2Scale = 1.0;
let chomping2 = false;

let snail3Col = 0;
let snail3Scale = 1.0;
let chomping3 = false;

let snail4Col = COLS - 1;
let snail4Scale = 1.0;
let chomping4 = false;

let roofEaten = false;
let roofParticles = [];

let doorEaten = false;
let doorParticles = [];

let babyBorn = false;
let babyScale = 0;
let babyX = 0;
let babyY = 0;
let baby2Born = false;
let baby2Scale = 0;
let baby2X = 0;
let baby2Y = 0;
let baby3Born = false;
let baby3Scale = 0;
let baby3X = 0;
let baby3Y = 0;
let baby4Born = false;
let baby4Scale = 0;
let baby4X = 0;
let baby4Y = 0;
let strainSoundPlayed = false;

function brickColor(r, c) {
  return BRICK_COLORS[(r * COLS + c + r) % BRICK_COLORS.length];
}

function resetGame(newLevel) {
  level = newLevel || 1;
  house = [];
  for (let r = 0; r < ROWS; r++) {
    house[r] = [];
    for (let c = 0; c < COLS; c++) {
      house[r][c] = { eaten: false, color: brickColor(r, c), fade: 1 };
    }
  }
  snailRow = ROWS - 1;
  snailScale = 1.0;
  chomping = false;
  chompTimer = 0;
  busting = false;
  bustTimer = 0;
  bustParticles = [];
  crunchParticles = [];
  gameOver = false;
  snail2Row = ROWS - 1;
  snail2Scale = 1.0;
  chomping2 = false;
  snail3Col = 0;
  snail3Scale = 1.0;
  chomping3 = false;
  snail4Col = COLS - 1;
  snail4Scale = 1.0;
  chomping4 = false;
  roofEaten = false;
  roofParticles = [];
  doorEaten = false;
  doorParticles = [];
  babyBorn = false;
  babyScale = 0;
  babyX = 0;
  babyY = 0;
  baby2Born = false;
  baby2Scale = 0;
  baby2X = 0;
  baby2Y = 0;
  baby3Born = false;
  baby3Scale = 0;
  baby3X = 0;
  baby3Y = 0;
  baby4Born = false;
  baby4Scale = 0;
  baby4X = 0;
  baby4Y = 0;
  strainSoundPlayed = false;
  document.getElementById('playAgain').style.display = 'none';
  document.getElementById('nextLevel').style.display = 'none';
  document.getElementById('controls').style.opacity = '1';
  document.getElementById('controls').style.pointerEvents = 'auto';
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#74b9ff');
  grad.addColorStop(0.6, '#a0d2ff');
  grad.addColorStop(0.85, '#55efc4');
  grad.addColorStop(1, '#00b894');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCloud(x, y, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(x, y, 20 * s, 0, Math.PI * 2);
  ctx.arc(x + 25 * s, y - 10 * s, 25 * s, 0, Math.PI * 2);
  ctx.arc(x + 50 * s, y, 20 * s, 0, Math.PI * 2);
  ctx.arc(x + 25 * s, y + 5 * s, 18 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawClouds() {
  const t = Date.now() * 0.00005;
  drawCloud((W * 0.15 + t * 200) % (W + 100) - 50, H * 0.12, 1.0);
  drawCloud((W * 0.6 + t * 150) % (W + 100) - 50, H * 0.08, 0.7);
  drawCloud((W * 0.85 + t * 100) % (W + 100) - 50, H * 0.18, 0.85);
}

function drawGround() {
  const groundY = H - Math.floor(H * 0.1);
  ctx.fillStyle = '#6ab04c';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.fillStyle = '#78e08f';
  ctx.fillRect(0, groundY, W, 4);
}

function drawRoof() {
  if (roofEaten) return;

  const peakX = HOUSE_X + HOUSE_W / 2;
  const peakY = HOUSE_Y - HOUSE_H * 0.4;
  const baseY = HOUSE_Y;
  const overhang = BLOCK_W * 0.6;

  ctx.fillStyle = '#b71540';
  ctx.beginPath();
  ctx.moveTo(HOUSE_X - overhang, baseY);
  ctx.lineTo(peakX, peakY);
  ctx.lineTo(HOUSE_X + HOUSE_W + overhang, baseY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#e55039';
  ctx.beginPath();
  ctx.moveTo(HOUSE_X - overhang + 8, baseY - 3);
  ctx.lineTo(peakX, peakY + 10);
  ctx.lineTo(HOUSE_X + HOUSE_W + overhang - 8, baseY - 3);
  ctx.closePath();
  ctx.fill();
}

function drawHouse() {
  drawRoof();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const block = house[r][c];
      if (block.eaten && block.fade <= 0) continue;

      const x = HOUSE_X + c * BLOCK_W;
      const y = HOUSE_Y + r * BLOCK_H;

      ctx.globalAlpha = block.fade;

      ctx.fillStyle = block.color;
      ctx.fillRect(x + 1, y + 1, BLOCK_W - 2, BLOCK_H - 2);

      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 1, y + 1, BLOCK_W - 2, BLOCK_H - 2);

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x + 3, y + 3, BLOCK_W - 6, BLOCK_H / 3);

      ctx.globalAlpha = 1;
    }
  }

}

function drawDoor() {
  if (doorEaten) return;

  const dw = BLOCK_W * 0.8;
  const dh = BLOCK_H * 1.5;
  const dx = HOUSE_X + HOUSE_W / 2 - dw / 2;
  const dy = HOUSE_Y + HOUSE_H - dh;

  ctx.fillStyle = '#6c5ce7';
  ctx.beginPath();
  ctx.moveTo(dx, dy + dh);
  ctx.lineTo(dx, dy + dw / 2);
  ctx.arc(dx + dw / 2, dy + dw / 2, dw / 2, Math.PI, 0);
  ctx.lineTo(dx + dw, dy + dh);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#f9ca24';
  ctx.beginPath();
  ctx.arc(dx + dw * 0.7, dy + dh * 0.55, 3, 0, Math.PI * 2);
  ctx.fill();
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16);
  const bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
}

function drawSnail(x, y, scale, mouthOpen, dir, angle) {
  ctx.save();
  ctx.translate(x, y);
  if (angle) ctx.rotate(angle);
  const facing = dir || -1;
  ctx.scale(facing * scale, scale);

  const totalBlocks = ROWS * COLS;
  const eaten = totalBlocks - countRemainingBlocks();
  const fullness = Math.min(1, eaten / totalBlocks);

  const shellFill = lerpColor('#e17055', '#6ab04c', fullness);
  const shellStroke = lerpColor('#d63031', '#27ae60', fullness);
  const shellSpiral = lerpColor('#c0392b', '#1e8449', fullness);

  const bodyLen = 40;
  const bodyH = 16;

  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.ellipse(0, 0, bodyLen / 2, bodyH / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fdcb6e';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const shellX = -5;
  const shellR = 18;
  ctx.fillStyle = shellFill;
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = shellStroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.strokeStyle = shellSpiral;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR * 0.65, Math.PI * 0.3, Math.PI * 1.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR * 0.35, Math.PI * 0.5, Math.PI * 2);
  ctx.stroke();

  const headX = bodyLen / 2 + 2;
  const headR = 10;

  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(headX, -4, headR, 0, Math.PI * 2);
  ctx.fill();

  const stalkDroop = fullness * 5;
  const eyeStalkH = 14 - stalkDroop;
  ctx.strokeStyle = '#fdcb6e';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(headX - 4, -10);
  ctx.lineTo(headX - 6, -10 - eyeStalkH);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(headX + 4, -10);
  ctx.lineTo(headX + 6, -10 - eyeStalkH);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX - 6, -10 - eyeStalkH, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + 6, -10 - eyeStalkH, 5, 0, Math.PI * 2);
  ctx.fill();

  if (fullness > 0.7) {
    const t = Date.now() * 0.008;
    const wobble = Math.sin(t) * 1.5 * fullness;
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.arc(headX - 5 + wobble, -10 - eyeStalkH + 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headX + 7 - wobble, -10 - eyeStalkH + 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#2d3436';
    ctx.beginPath();
    ctx.arc(headX - 5, -10 - eyeStalkH + 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headX + 7, -10 - eyeStalkH + 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX - 5.5, -10 - eyeStalkH - 0.5, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + 6.5, -10 - eyeStalkH - 0.5, 1, 0, Math.PI * 2);
  ctx.fill();

  if (fullness > 0.4) {
    const browAngle = fullness * 0.4;
    ctx.strokeStyle = '#fdcb6e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(headX - 9, -10 - eyeStalkH - 3);
    ctx.lineTo(headX - 3, -10 - eyeStalkH - 3 - browAngle * 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(headX + 10, -10 - eyeStalkH - 3);
    ctx.lineTo(headX + 4, -10 - eyeStalkH - 3 - browAngle * 5);
    ctx.stroke();
  }

  if (mouthOpen) {
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.arc(headX + 8, -2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(headX + 8, -2, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.strokeStyle = '#e17055';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (fullness < 0.3) {
      ctx.arc(headX + 6, -1, 4, 0, Math.PI);
    } else {
      const frownDepth = (fullness - 0.3) / 0.7;
      ctx.arc(headX + 6, -1 + frownDepth * 6, 4, Math.PI, Math.PI * 2);
    }
    ctx.stroke();
  }

  ctx.fillStyle = '#ffcccc';
  ctx.beginPath();
  ctx.arc(headX - 2, 2, 3, 0, Math.PI * 2);
  ctx.fill();

  if (fullness > 0.5) {
    const sweatBob = Math.sin(Date.now() * 0.005) * 1.5;
    ctx.fillStyle = 'rgba(116, 185, 255, 0.7)';
    ctx.beginPath();
    ctx.moveTo(headX + 12, -12 + sweatBob);
    ctx.quadraticCurveTo(headX + 14, -8 + sweatBob, headX + 12, -5 + sweatBob);
    ctx.quadraticCurveTo(headX + 10, -8 + sweatBob, headX + 12, -12 + sweatBob);
    ctx.fill();
  }

  ctx.restore();
}

function drawBabySnail(x, y, scale) {
  if (scale <= 0) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const bodyLen = 30;
  const bodyH = 12;

  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.ellipse(0, 0, bodyLen / 2, bodyH / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fdcb6e';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const shellX = -3;
  const shellR = 14;

  ctx.fillStyle = '#e17055';
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR, 0, Math.PI * 2);
  ctx.fill();

  const brickW = 7;
  const brickH = 5;
  ctx.save();
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR - 1, 0, Math.PI * 2);
  ctx.clip();
  for (let row = -3; row <= 3; row++) {
    for (let col = -2; col <= 2; col++) {
      const offset = (row % 2 === 0) ? brickW / 2 : 0;
      const bx = shellX + col * brickW + offset;
      const by = -shellR + 2 + row * brickH;
      const ci = Math.abs((row * 3 + col) % BRICK_COLORS.length);
      ctx.fillStyle = BRICK_COLORS[ci];
      ctx.fillRect(bx + 0.5, by + 0.5, brickW - 1, brickH - 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(bx + 0.5, by + 0.5, brickW - 1, brickH - 1);
    }
  }
  ctx.restore();

  ctx.strokeStyle = '#d63031';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(shellX, -shellR + 2, shellR, 0, Math.PI * 2);
  ctx.stroke();

  const headX = bodyLen / 2;
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(headX, -3, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#fdcb6e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(headX - 3, -8);
  ctx.lineTo(headX - 4, -17);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(headX + 3, -8);
  ctx.lineTo(headX + 4, -17);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX - 4, -17, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + 4, -17, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(headX - 3.5, -16.5, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + 4.5, -16.5, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX - 4, -17.5, 0.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + 4, -17.5, 0.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#e17055';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(headX + 5, -1, 3, 0, Math.PI);
  ctx.stroke();

  ctx.fillStyle = '#ffcccc';
  ctx.beginPath();
  ctx.arc(headX - 1, 1, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCrunchParticles() {
  for (let i = crunchParticles.length - 1; i >= 0; i--) {
    const p = crunchParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life -= 0.025;
    if (p.life <= 0) { crunchParticles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.globalAlpha = 1;
  }
}

function drawBustParticles() {
  for (let i = bustParticles.length - 1; i >= 0; i--) {
    const p = bustParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.008;
    p.rot += p.rotSpeed;
    if (p.life <= 0) { bustParticles.splice(i, 1); continue; }

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = Math.min(1, p.life * 2);

    if (p.shape === 'star') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      for (let s = 0; s < 5; s++) {
        const angle = (s * 4 * Math.PI) / 5 - Math.PI / 2;
        const r = s === 0 ? p.size : p.size;
        if (s === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
        else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      }
      ctx.closePath();
      ctx.fill();
    } else if (p.shape === 'circle') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function spawnCrunchParticles(bx, by) {
  const colors = ['#e17055', '#fdcb6e', '#d63031', '#fab1a0', '#ffeaa7'];
  for (let i = 0; i < 12; i++) {
    crunchParticles.push({
      x: bx, y: by,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.8) * 6,
      size: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1
    });
  }
}

function spawnBustParticles(sx, sy) {
  const colors = ['#e17055','#fdcb6e','#00b894','#6c5ce7','#fd79a8','#00cec9','#ffeaa7','#ff6b6b','#a29bfe','#55efc4'];
  const shapes = ['star', 'circle', 'rect'];
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 8;
    bustParticles.push({
      x: sx, y: sy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size: 4 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      life: 1,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

function spawnRoofParticles(cx, cy) {
  const colors = ['#b71540', '#e55039', '#d63031', '#c0392b', '#6F1E51', '#ff6b6b'];
  const shapes = ['rect', 'rect', 'rect', 'circle'];
  for (let i = 0; i < 40; i++) {
    roofParticles.push({
      x: cx + (Math.random() - 0.5) * HOUSE_W,
      y: cy + (Math.random() - 0.5) * HOUSE_H * 0.3,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.8) * 8,
      size: 5 + Math.random() * 12,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      life: 1,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3
    });
  }
}

function spawnDoorParticles() {
  const dw = BLOCK_W * 0.8;
  const dh = BLOCK_H * 1.5;
  const dx = HOUSE_X + HOUSE_W / 2;
  const dy = HOUSE_Y + HOUSE_H - dh / 2;
  const colors = ['#6c5ce7', '#a29bfe', '#4834d4', '#f9ca24', '#341f97'];
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 7;
    doorParticles.push({
      x: dx + (Math.random() - 0.5) * dw,
      y: dy + (Math.random() - 0.5) * dh,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 4 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: 'rect',
      life: 1,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25
    });
  }
}

function drawExtraParticles(particles) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.012;
    p.rot += p.rotSpeed;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;

    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function getSnailPos() {
  const x = HOUSE_X + HOUSE_W + BLOCK_W * 0.7 + (snailScale - 1) * 10;
  let y;
  if (snailRow === -1) {
    y = HOUSE_Y - HOUSE_H * 0.2;
  } else if (snailRow === ROWS) {
    y = HOUSE_Y + HOUSE_H + BLOCK_H * 0.5;
  } else {
    y = HOUSE_Y + snailRow * BLOCK_H + BLOCK_H / 2;
  }
  return { x, y };
}

function getSnail2Pos() {
  const x = HOUSE_X - BLOCK_W * 0.7 - (snail2Scale - 1) * 10;
  let y;
  if (snail2Row === -1) {
    y = HOUSE_Y - HOUSE_H * 0.2;
  } else if (snail2Row === ROWS) {
    y = HOUSE_Y + HOUSE_H + BLOCK_H * 0.5;
  } else {
    y = HOUSE_Y + snail2Row * BLOCK_H + BLOCK_H / 2;
  }
  return { x, y };
}

function findLeftmostBlock(row) {
  for (let c = 0; c < COLS; c++) {
    if (!house[row][c].eaten) return c;
  }
  return -1;
}

function findTopmostBlock(col) {
  for (let r = 0; r < ROWS; r++) {
    if (!house[r][col].eaten) return r;
  }
  return -1;
}

function findBottommostBlock(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!house[r][col].eaten) return r;
  }
  return -1;
}

function getSnail3Pos() {
  const y = HOUSE_Y - BLOCK_H * 1.2 - (snail3Scale - 1) * 10;
  const x = HOUSE_X + snail3Col * BLOCK_W + BLOCK_W / 2;
  return { x, y };
}

function getSnail4Pos() {
  const y = HOUSE_Y + HOUSE_H + BLOCK_H * 1.2 + (snail4Scale - 1) * 10;
  const x = HOUSE_X + snail4Col * BLOCK_W + BLOCK_W / 2;
  return { x, y };
}

function autoAdvanceCol(col, findFn) {
  for (let c = col + 1; c < COLS; c++) {
    if (findFn(c) !== -1) return c;
  }
  for (let c = col - 1; c >= 0; c--) {
    if (findFn(c) !== -1) return c;
  }
  return null;
}

function countRemainingBlocks() {
  let count = 0;
  if (!roofEaten) count++;
  if (!doorEaten) count++;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!house[r][c].eaten) count++;
  return count;
}

function findRightmostBlock(row) {
  for (let c = COLS - 1; c >= 0; c--) {
    if (!house[row][c].eaten) return c;
  }
  return -1;
}

let chompCloseTimer = null;
let chompCloseTimer2 = null;
let chompCloseTimer3 = null;
let chompCloseTimer4 = null;

function autoAdvanceSnail(row, findFn) {
  for (let r = row - 1; r >= -1; r--) {
    if (r === -1) {
      if (!roofEaten) return r;
    } else {
      if (findFn(r) !== -1) return r;
    }
  }
  return null;
}

function eatBlock(r, c) {
  house[r][c].eaten = true;
  house[r][c].fade = 1;
  spawnCrunchParticles(HOUSE_X + c * BLOCK_W + BLOCK_W / 2, HOUSE_Y + r * BLOCK_H + BLOCK_H / 2);
  sfxChomp();
}

function doChomp() {
  if (busting || gameOver) return;

  let didEat1 = false, didEat2 = false, didEat3 = false, didEat4 = false;

  if (snailRow === -1) {
    if (!roofEaten) { roofEaten = true; spawnRoofParticles(HOUSE_X + HOUSE_W / 2, HOUSE_Y - HOUSE_H * 0.2); sfxBigChomp(); didEat1 = true; }
  } else if (snailRow === ROWS) {
    if (!doorEaten) { doorEaten = true; spawnDoorParticles(); sfxBigChomp(); didEat1 = true; }
  } else {
    const col = findRightmostBlock(snailRow);
    if (col !== -1) { eatBlock(snailRow, col); didEat1 = true; }
  }

  if (level >= 2) {
    if (snail2Row === -1) {
      if (!roofEaten) { roofEaten = true; spawnRoofParticles(HOUSE_X + HOUSE_W / 2, HOUSE_Y - HOUSE_H * 0.2); sfxBigChomp(); didEat2 = true; }
    } else if (snail2Row === ROWS) {
      if (!doorEaten) { doorEaten = true; spawnDoorParticles(); sfxBigChomp(); didEat2 = true; }
    } else {
      const col2 = findLeftmostBlock(snail2Row);
      if (col2 !== -1) { eatBlock(snail2Row, col2); didEat2 = true; }
    }
  }

  if (level >= 3) {
    const r3 = findTopmostBlock(snail3Col);
    if (r3 !== -1) { eatBlock(r3, snail3Col); didEat3 = true; }

    const r4 = findBottommostBlock(snail4Col);
    if (r4 !== -1) { eatBlock(r4, snail4Col); didEat4 = true; }
  }

  if (!didEat1) {
    if (snailRow >= 0 && snailRow < ROWS) {
      const next = autoAdvanceSnail(snailRow, findRightmostBlock);
      if (next !== null) { snailRow = next; sfxMove(); }
    }
  }
  if (level >= 2 && !didEat2) {
    if (snail2Row >= 0 && snail2Row < ROWS) {
      const next = autoAdvanceSnail(snail2Row, findLeftmostBlock);
      if (next !== null) { snail2Row = next; sfxMove(); }
    }
  }
  if (level >= 3 && !didEat3) {
    const next = autoAdvanceCol(snail3Col, findTopmostBlock);
    if (next !== null) { snail3Col = next; sfxMove(); }
  }
  if (level >= 3 && !didEat4) {
    const next = autoAdvanceCol(snail4Col, findBottommostBlock);
    if (next !== null) { snail4Col = next; sfxMove(); }
  }

  if (!didEat1 && !didEat2 && !didEat3 && !didEat4) return;

  const growAmt = level === 3 ? 0.04 : 0.06;

  if (didEat1) {
    chomping = true; snailScale += growAmt;
    clearTimeout(chompCloseTimer);
    chompCloseTimer = setTimeout(() => { chomping = false; }, 200);
  }
  if (didEat2) {
    chomping2 = true; snail2Scale += growAmt;
    clearTimeout(chompCloseTimer2);
    chompCloseTimer2 = setTimeout(() => { chomping2 = false; }, 200);
  }
  if (didEat3) {
    chomping3 = true; snail3Scale += growAmt;
    clearTimeout(chompCloseTimer3);
    chompCloseTimer3 = setTimeout(() => { chomping3 = false; }, 200);
  }
  if (didEat4) {
    chomping4 = true; snail4Scale += growAmt;
    clearTimeout(chompCloseTimer4);
    chompCloseTimer4 = setTimeout(() => { chomping4 = false; }, 200);
  }

  if (countRemainingBlocks() === 0) {
    stopSucking();
    setTimeout(() => { busting = true; bustTimer = 0; }, 300);
  }
}

function moveUp() {
  if (busting || gameOver) return;
  let moved = false;
  if (snailRow > -1) { snailRow--; moved = true; }
  if (level >= 2 && snail2Row > -1) { snail2Row--; moved = true; }
  if (level >= 3) {
    if (snail3Col > 0) { snail3Col--; moved = true; }
    if (snail4Col > 0) { snail4Col--; moved = true; }
  }
  if (moved) sfxMove();
}

function moveDown() {
  if (busting || gameOver) return;
  let moved = false;
  if (snailRow < ROWS) { snailRow++; moved = true; }
  if (level >= 2 && snail2Row < ROWS) { snail2Row++; moved = true; }
  if (level >= 3) {
    if (snail3Col < COLS - 1) { snail3Col++; moved = true; }
    if (snail4Col < COLS - 1) { snail4Col++; moved = true; }
  }
  if (moved) sfxMove();
}

let sucking = false;
let suckInterval = null;
const SUCK_SPEED = 120;

function startSucking() {
  if (sucking) return;
  sucking = true;
  doChomp();
  suckInterval = setInterval(() => {
    if (!sucking || busting || gameOver) { stopSucking(); return; }
    doChomp();
  }, SUCK_SPEED);
}

function stopSucking() {
  sucking = false;
  if (suckInterval) { clearInterval(suckInterval); suckInterval = null; }
}

let lastTime = 0;
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  sizing();
  drawSky();
  drawClouds();
  drawGround();
  drawHouse();
  drawDoor();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const block = house[r][c];
      if (block.eaten && block.fade > 0) {
        block.fade = Math.max(0, block.fade - 0.05);
      }
    }
  }

  drawCrunchParticles();

  drawExtraParticles(roofParticles);
  drawExtraParticles(doorParticles);

  function strainDraw(px, py, sc, shk, sq, dir, ang) {
    ctx.save();
    ctx.translate(px, py);
    ctx.scale(sc * sq, sc / sq);
    ctx.translate(-px, -py);
    drawSnail(px + shk, py, 1, true, dir, ang);
    ctx.restore();
  }

  if (busting) {
    bustTimer += dt;
    const pos = getSnailPos();
    const pos2 = (level >= 2) ? getSnail2Pos() : null;
    const pos3 = (level >= 3) ? getSnail3Pos() : null;
    const pos4 = (level >= 3) ? getSnail4Pos() : null;
    const groundY = H - Math.floor(H * 0.1);

    if (bustTimer < 1500) {
      if (!strainSoundPlayed) { sfxStrain(); strainSoundPlayed = true; }
      const intensity = bustTimer / 1500;
      const shake = Math.sin(bustTimer * 0.06) * intensity * 6;
      const squish = 1 + Math.sin(bustTimer * 0.02) * intensity * 0.1;

      strainDraw(pos.x, pos.y, snailScale, shake, squish, -1);
      if (level >= 2) strainDraw(pos2.x, pos2.y, snail2Scale, -shake, squish, 1);
      if (level >= 3) {
        strainDraw(pos3.x, pos3.y, snail3Scale, shake, squish, -1, Math.PI / 2);
        strainDraw(pos4.x, pos4.y, snail4Scale, -shake, squish, -1, -Math.PI / 2);
      }
    } else if (bustTimer < 1700) {
      const popProgress = (bustTimer - 1500) / 200;

      if (!babyBorn) {
        babyBorn = true;
        babyX = pos.x + 50 * snailScale;
        babyY = groundY - 10;
        sfxPoop();
      }
      babyScale = popProgress;
      drawSnail(pos.x, pos.y, snailScale - popProgress * (snailScale - 1), false, -1);
      drawSnail(babyX, babyY, babyScale, false, 1);

      if (level >= 2) {
        if (!baby2Born) { baby2Born = true; baby2X = pos2.x - 50 * snail2Scale; baby2Y = groundY - 10; setTimeout(sfxPoop, 80); }
        baby2Scale = popProgress;
        drawSnail(pos2.x, pos2.y, snail2Scale - popProgress * (snail2Scale - 1), false, 1);
        drawSnail(baby2X, baby2Y, baby2Scale, false, -1);
      }
      if (level >= 3) {
        if (!baby3Born) { baby3Born = true; baby3X = pos3.x; baby3Y = pos3.y - 45 * snail3Scale; setTimeout(sfxPoop, 160); }
        baby3Scale = popProgress;
        drawSnail(pos3.x, pos3.y, snail3Scale - popProgress * (snail3Scale - 1), false, -1, Math.PI / 2);
        drawSnail(baby3X, baby3Y, baby3Scale, false, -1);

        if (!baby4Born) { baby4Born = true; baby4X = pos4.x; baby4Y = pos4.y + 45 * snail4Scale; setTimeout(sfxPoop, 240); }
        baby4Scale = popProgress;
        drawSnail(pos4.x, pos4.y, snail4Scale - popProgress * (snail4Scale - 1), false, -1, -Math.PI / 2);
        drawSnail(baby4X, baby4Y, baby4Scale, false, 1);
      }
    } else {
      const t = Date.now();
      const bob = (i) => Math.sin(t * 0.004 + i) * 2;

      drawSnail(pos.x, pos.y + bob(0), 1.0, false, -1);
      babyScale = Math.min(1.0, babyScale + 0.01);
      drawSnail(babyX, babyY + bob(1), babyScale, false, 1);

      if (level >= 2) {
        drawSnail(pos2.x, pos2.y + bob(2), 1.0, false, 1);
        baby2Scale = Math.min(1.0, baby2Scale + 0.01);
        drawSnail(baby2X, baby2Y + bob(3), baby2Scale, false, -1);
      }
      if (level >= 3) {
        drawSnail(pos3.x + bob(4), pos3.y, 1.0, false, -1, Math.PI / 2);
        baby3Scale = Math.min(1.0, baby3Scale + 0.01);
        drawSnail(baby3X, baby3Y + bob(5), baby3Scale, false, -1);

        drawSnail(pos4.x + bob(6), pos4.y, 1.0, false, -1, -Math.PI / 2);
        baby4Scale = Math.min(1.0, baby4Scale + 0.01);
        drawSnail(baby4X, baby4Y + bob(7), baby4Scale, false, 1);
      }

      if (bustTimer > 3000 && !gameOver) {
        gameOver = true;
        sfxWin();
        if (level < 3) {
          document.getElementById('nextLevel').style.display = 'block';
        } else {
          document.getElementById('playAgain').style.display = 'block';
        }
        document.getElementById('controls').style.opacity = '0.3';
        document.getElementById('controls').style.pointerEvents = 'none';
      }
    }
  } else {
    const t = Date.now();
    const wobble = Math.sin(t * 0.003) * 1.5;

    drawSnail(getSnailPos().x, getSnailPos().y + wobble, snailScale, chomping || sucking, -1);

    if (level >= 2) {
      const p2 = getSnail2Pos();
      drawSnail(p2.x, p2.y + Math.sin(t * 0.003 + 1) * 1.5, snail2Scale, chomping2 || sucking, 1);
    }
    if (level >= 3) {
      const p3 = getSnail3Pos();
      drawSnail(p3.x + Math.sin(t * 0.003 + 2) * 1.5, p3.y, snail3Scale, chomping3 || sucking, -1, Math.PI / 2);
      const p4 = getSnail4Pos();
      drawSnail(p4.x + Math.sin(t * 0.003 + 3) * 1.5, p4.y, snail4Scale, chomping4 || sucking, -1, -Math.PI / 2);
    }
  }

  requestAnimationFrame(gameLoop);
}

document.getElementById('btnUp').addEventListener('click', moveUp);
document.getElementById('btnDown').addEventListener('click', moveDown);

const chompBtn = document.getElementById('btnChomp');
chompBtn.addEventListener('mousedown', startSucking);
chompBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSucking(); });
chompBtn.addEventListener('mouseup', stopSucking);
chompBtn.addEventListener('mouseleave', stopSucking);
chompBtn.addEventListener('touchend', stopSucking);
chompBtn.addEventListener('touchcancel', stopSucking);

document.getElementById('playAgain').addEventListener('click', () => {
  resetGame(1);
});

document.getElementById('nextLevel').addEventListener('click', () => {
  resetGame(level + 1);
});

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.key === 'ArrowUp' || e.key === 'w') moveUp();
  else if (e.key === 'ArrowDown' || e.key === 's') moveDown();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); startSucking(); }
});

document.addEventListener('keyup', (e) => {
  if (e.key === ' ' || e.key === 'Enter') stopSucking();
});

sizing();
resetGame(1);
requestAnimationFrame(gameLoop);
</script>
